<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIVORYX 2026 — National Conference on Biotechnology | Jeppiaar Engineering College</title>
  <meta name="description" content="VIVORYX is a national conference on Recent Advances, Emerging Trends and Innovation in Biotechnology, organized by the Department of Biotechnology, Jeppiaar Engineering College in association with IEEE EMBS." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green-dark:  #1A3C2E;
      --green-mid:   #245738;
      --green-light: #2e6b44;
      --gold:        #F5C518;
      --gold-light:  #ffd84a;
      --gold-dim:    rgba(245,197,24,0.15);
      --bg:          #F4F9F4;
      --text:        #1C2B1C;
      --white:       #FFFFFF;
      --ieee-blue:   #006699;
      --card-shadow: 0 4px 24px rgba(26,60,46,0.10);
      --radius:      14px;
      --radius-sm:   8px;
      --transition:  0.32s cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html  { scroll-behavior: smooth; font-size: 16px; }
    body  { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.7; overflow-x: hidden; }
    h1,h2,h3,h4,h5 { font-family: 'Playfair Display', serif; line-height: 1.25; }
    a  { text-decoration: none; color: inherit; }
    section { padding: 90px 0; }
    .container { width: min(1140px, 92vw); margin: 0 auto; }
    .section-label { font-family: 'Space Mono', monospace; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; display: block; }
    .section-title { font-size: clamp(1.8rem, 3.5vw, 2.6rem); color: var(--green-dark); margin-bottom: 18px; }
    .section-title.light { color: var(--white); }
    .divider { width: 60px; height: 3px; background: var(--gold); border-radius: 2px; margin-bottom: 48px; }
    .divider.center { margin-left: auto; margin-right: auto; }
    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 1rem; cursor: pointer; border: 2px solid transparent; transition: transform var(--transition), box-shadow var(--transition), background var(--transition); }
    .btn-primary { background: var(--gold); color: var(--green-dark); border-color: var(--gold); animation: pulse-gold 2s infinite; }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px) scale(1.04); box-shadow: 0 8px 28px rgba(245,197,24,0.45); }
    .btn-outline { background: transparent; color: var(--white); border-color: var(--gold); }
    .btn-outline:hover { background: var(--gold-dim); transform: translateY(-2px) scale(1.04); }
    .btn-gold-solid { background: var(--gold); color: var(--green-dark); font-size: 1.08rem; padding: 16px 42px; font-family: 'DM Sans', sans-serif; font-weight: 700; border-radius: 50px; display: inline-flex; align-items: center; gap: 10px; cursor: pointer; border: 2px solid var(--gold); transition: transform var(--transition), box-shadow var(--transition); }
    .btn-gold-solid:hover { background: var(--gold-light); transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 32px rgba(245,197,24,0.5); }
    @keyframes pulse-gold { 0%,100% { box-shadow: 0 0 0 0 rgba(245,197,24,0.5); } 50% { box-shadow: 0 0 0 12px rgba(245,197,24,0); } }

    /* ── NAVBAR ── */
    #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(26,60,46,0.97); border-bottom: 2px solid var(--gold); padding: 0 5vw; height: 64px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); transition: box-shadow var(--transition); }
    #navbar.scrolled { box-shadow: 0 4px 24px rgba(0,0,0,0.25); }
    .nav-brand { font-family: 'Space Mono', monospace; font-size: 0.82rem; color: var(--gold); letter-spacing: 0.07em; white-space: nowrap; }
    .nav-center { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-variant: small-caps; letter-spacing: 0.18em; color: var(--white); flex: 1; text-align: center; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; color: rgba(255,255,255,0.82); transition: color var(--transition); padding-bottom: 3px; border-bottom: 2px solid transparent; }
    .nav-links a:hover { color: var(--gold); border-bottom-color: var(--gold); }
    .nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; border: none; background: none; padding: 4px; }
    .nav-toggle span { display: block; width: 25px; height: 2px; background: var(--white); border-radius: 2px; }
    .nav-mobile { display: none; position: fixed; top: 64px; left: 0; right: 0; background: rgba(26,60,46,0.98); z-index: 999; padding: 20px 5vw; flex-direction: column; border-bottom: 2px solid var(--gold); }
    .nav-mobile.open { display: flex; }
    .nav-mobile a { display: block; padding: 14px 0; color: rgba(255,255,255,0.88); font-family: 'DM Sans', sans-serif; font-size: 1rem; border-bottom: 1px solid rgba(245,197,24,0.15); }
    .nav-mobile a:hover { color: var(--gold); }

    @media (max-width: 768px) {
      section { padding: 64px 0; }
      .nav-links { display: none; }
      .nav-toggle { display: flex; }
    }
  </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav id="navbar" aria-label="Main navigation">
  <span class="nav-brand">IEEE EMBS | JEC</span>
  <div class="nav-center">VIVORYX</div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#themes">Themes</a></li>
    <li><a href="#guidelines">Guidelines</a></li>
    <li><a href="#agenda">Agenda</a></li>
    <li><a href="#register">Register</a></li>
  </ul>
  <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</nav>
<nav class="nav-mobile" id="nav-mobile" aria-label="Mobile navigation">
  <a href="#about"      onclick="closeMobile()">About</a>
  <a href="#themes"     onclick="closeMobile()">Themes</a>
  <a href="#guidelines" onclick="closeMobile()">Guidelines</a>
  <a href="#agenda"     onclick="closeMobile()">Agenda</a>
  <a href="#register"   onclick="closeMobile()">Register</a>
</nav>

<script>
  // Navbar scroll shadow
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => { navbar.classList.toggle('scrolled', window.scrollY > 20); }, { passive: true });
  // Mobile nav
  const toggle   = document.getElementById('nav-toggle');
  const mobileNav= document.getElementById('nav-mobile');
  function closeMobile() { mobileNav.classList.remove('open'); toggle.setAttribute('aria-expanded','false'); }
  toggle.addEventListener('click', () => { const open = mobileNav.classList.toggle('open'); toggle.setAttribute('aria-expanded', String(open)); });
  // Scroll reveal
  const revealEls = document.querySelectorAll('.reveal');
  const io = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } }); }, { threshold: 0.12 });
  revealEls.forEach(el => io.observe(el));
</script>
</body>
</html>
