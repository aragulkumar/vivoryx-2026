<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIVORYX 2026 — National Conference on Biotechnology | Jeppiaar Engineering College</title>
  <meta name="description" content="VIVORYX is a national conference on Recent Advances, Emerging Trends and Innovation in Biotechnology, organized by the Department of Biotechnology, Jeppiaar Engineering College in association with IEEE EMBS." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ======================================
       DESIGN TOKENS & CSS RESET
    ====================================== */
    :root {
      --green-dark:  #1A3C2E;
      --green-mid:   #245738;
      --green-light: #2e6b44;
      --gold:        #F5C518;
      --gold-light:  #ffd84a;
      --gold-dim:    rgba(245,197,24,0.15);
      --bg:          #F4F9F4;
      --text:        #1C2B1C;
      --white:       #FFFFFF;
      --ieee-blue:   #006699;
      --card-shadow: 0 4px 24px rgba(26,60,46,0.10);
      --radius:      14px;
      --radius-sm:   8px;
      --transition:  0.32s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html  { scroll-behavior: smooth; font-size: 16px; }
    body  { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.7; overflow-x: hidden; }
    h1,h2,h3,h4,h5 { font-family: 'Playfair Display', serif; line-height: 1.25; }
    a  { text-decoration: none; color: inherit; }
    img{ max-width: 100%; display: block; }

    /* ======================================
       LAYOUT UTILITIES
    ====================================== */
    section { padding: 90px 0; }
    .container { width: min(1140px, 92vw); margin: 0 auto; }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
      display: block;
    }
    .section-title {
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      color: var(--green-dark);
      margin-bottom: 18px;
    }
    .section-title.light { color: var(--white); }
    .divider { width: 60px; height: 3px; background: var(--gold); border-radius: 2px; margin-bottom: 48px; }
    .divider.center { margin-left: auto; margin-right: auto; }

    /* ======================================
       SCROLL REVEAL ANIMATION
    ====================================== */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible      { opacity: 1; transform: translateY(0); }
    .reveal-delay-1      { transition-delay: 0.1s; }
    .reveal-delay-2      { transition-delay: 0.2s; }
    .reveal-delay-3      { transition-delay: 0.3s; }
    .reveal-delay-4      { transition-delay: 0.4s; }

    /* ======================================
       BUTTONS
    ====================================== */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px; border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 1rem;
      cursor: pointer; border: 2px solid transparent;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
    }
    .btn-primary { background: var(--gold); color: var(--green-dark); border-color: var(--gold); animation: pulse-gold 2s infinite; }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px) scale(1.04); box-shadow: 0 8px 28px rgba(245,197,24,0.45); }
    .btn-outline  { background: transparent; color: var(--white); border-color: var(--gold); }
    .btn-outline:hover  { background: var(--gold-dim); transform: translateY(-2px) scale(1.04); }
    .btn-gold-solid {
      background: var(--gold); color: var(--green-dark);
      font-size: 1.08rem; padding: 16px 42px;
      font-family: 'DM Sans', sans-serif; font-weight: 700; border-radius: 50px;
      display: inline-flex; align-items: center; gap: 10px;
      cursor: pointer; border: 2px solid var(--gold);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .btn-gold-solid:hover { background: var(--gold-light); transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 32px rgba(245,197,24,0.5); }

    @keyframes pulse-gold {
      0%,100% { box-shadow: 0 0 0 0 rgba(245,197,24,0.5); }
      50%      { box-shadow: 0 0 0 12px rgba(245,197,24,0); }
    }
  </style>
</head>
<body>
  <!-- Sections will be added incrementally -->
  <script>
    /* ======================================
       INTERSECTION OBSERVER — SCROLL REVEAL
    ====================================== */
    const revealEls = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { entry.target.classList.add('visible'); io.unobserve(entry.target); }
      });
    }, { threshold: 0.12 });
    revealEls.forEach(el => io.observe(el));
  </script>
</body>
</html>
